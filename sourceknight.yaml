project:
  sourceknight: 0.3
  name: FamilyShareManager

  vars:
    sm_branch: 1.12
    sm_version: 1.12.0-git7223

  dependencies:
    - name: sourcemod
      type: tar
      version: ${sm_version}
      location: https://sm.alliedmods.net/smdrop/${sm_branch}/sourcemod-${sm_version}-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: ext-ripext
      type: git
      repo: https://github.com/srcdslab/sm-ext-ripext
      unpack:
        - source: /pawn/scripting
          dest: /addons/sourcemod/scripting

    - name: ext-steamworks
      type: git
      repo: https://github.com/srcdslab/sm-ext-SteamWorks
      unpack:
        - source: /Pawn/include
          dest: /addons/sourcemod/scripting/include

    - name: multicolors
      type: git
      repo: https://github.com/srcdslab/sm-plugin-MultiColors
      unpack:
        - source: /addons
          dest: /addons

    - name: sourcebans-pp
      type: git
      repo: https://github.com/srcdslab/sourcebans-pp
      unpack:
        - source: /game/addons
          dest: /addons

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - FamilyShareManager
